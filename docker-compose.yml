services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: commodity_dataset
      POSTGRES_USER: collector
      POSTGRES_PASSWORD: collector_password
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collector -d commodity_dataset"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "scripts/run_scheduler.py"]
    restart: unless-stopped

volumes:
  postgres_data:
